<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campfire Harcerski 🔥</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f4eae1; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Ekran logowania/rejestracji */
        .auth-container { background: white; padding: 35px; border-radius: 16px; box-shadow: 0 8px 24px rgba(59, 122, 87, 0.15); width: 100%; max-width: 400px; text-align: center; border: 2px solid #3b7a57; }
        .auth-container h2 { margin-bottom: 5px; color: #3b7a57; font-size: 28px; }
        .auth-container .subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }
        .auth-container input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 16px; outline: none; }
        .auth-container input:focus { border-color: #3b7a57; }
        .auth-container button { width: 100%; padding: 12px; background: #3b7a57; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 10px; font-weight: bold; transition: 0.2s; }
        .auth-container button:hover { background: #2d5e43; }
        .auth-container p { margin-top: 15px; font-size: 14px; color: #666; }
        .auth-container span { color: #3b7a57; cursor: pointer; font-weight: bold; }

        /* Ekran Główny Czatu (Układ typu Discord - boczny panel i czat) */
        .chat-interface { display: none; width: 100%; max-width: 1000px; height: 90vh; background: white; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #ccc; }
        
        /* Panel boczny z grupami i profilem */
        .sidebar { width: 260px; background: #2d5e43; color: white; display: flex; flex-direction: column; border-right: 1px solid #234a35; }
        .sidebar-header { padding: 20px; background: #234a35; font-weight: bold; font-size: 18px; text-align: center; border-bottom: 1px solid #1c3b2a; }
        
        .groups-list { flex: 1; padding: 15px 10px; display: flex; flex-direction: column; gap: 5px; overflow-y: auto; }
        .group-btn { padding: 10px 15px; background: transparent; border: none; color: #c2d6cc; text-align: left; font-size: 15px; border-radius: 8px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .group-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .group-btn.active { background: #3b7a57; color: white; font-weight: bold; }

        /* Mini profil na dole panelu bocznego */
        .user-profile-bar { padding: 15px; background: #234a35; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #1c3b2a; }
        .profile-info { display: flex; flex-direction: column; max-width: 140px; }
        .profile-info .display-name { font-weight: bold; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .profile-info .user-email { font-size: 11px; color: #a3c2b2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .logout-btn { background: transparent; color: #ff9999; border: 1px solid #ff9999; padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .logout-btn:hover { background: #ff9999; color: #234a35; }

        /* Główny obszar rozmowy */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #fdfbf7; }
        .chat-header { background: #3b7a57; color: white; padding: 17px 20px; font-weight: bold; font-size: 18px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .messages-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .message .sender { font-size: 12px; color: #555; margin-bottom: 4px; font-weight: bold; }
        .message.incoming { background: #f0f0f0; align-self: flex-start; border-top-left-radius: 0; color: #333; }
        .message.outgoing { background: #e2f0d9; align-self: flex-end; border-top-right-radius: 0; color: #2d5e43; border: 1px solid #c8e2b9; }

        .chat-input-area { padding: 15px; background: #f9f9f9; display: flex; gap: 10px; border-top: 1px solid #eee; }
        .chat-input-area input { flex: 1; padding: 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        .chat-input-area input:focus { border-color: #3b7a57; }
        .chat-input-area button { padding: 14px 24px; background: #3b7a57; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .chat-input-area button:hover { background: #2d5e43; }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <h2 id="auth-title">Campfire 🔥</h2>
        <div class="subtitle">Harcerski Komunikator</div>
        
        <input type="text" id="auth-username" placeholder="Imię / Nick (np. druh Tomek)" style="display: none;">
        
        <input type="email" id="auth-email" placeholder="Adres E-mail">
        <input type="password" id="auth-password" placeholder="Hasło (min. 6 znaków)">
        <button id="auth-btn" onclick="handleAuth()">Zaloguj się</button>
        <p id="auth-toggle-text">Nie masz konta? <span onclick="toggleAuthMode()">Zarejestruj się</span></p>
    </div>

    <div id="chat-screen" class="chat-interface">
        
        <div class="sidebar">
            <div class="sidebar-header">Zastępy & Kręgi ⚜️</div>
            <div class="groups-list" id="groups-list">
                </div>
            <div class="user-profile-bar">
                <div class="profile-info">
                    <span class="display-name" id="profile-display-name">Wczytywanie...</span>
                    <span class="user-email" id="profile-display-email">...</span>
                </div>
                <button class="logout-btn" onclick="logout()">Wyloguj</button>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header" id="current-group-title">Grupa: Ogólny</div>
            <div id="messages-box" class="messages-box"></div>
            <div class="chat-input-area">
                <input type="text" id="message-input" placeholder="Napisz coś na tym kanale..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Wyślij</button>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        // Twoja automatyczna konfiguracja Campfire
        const firebaseConfig = {
            apiKey: "AIzaSyCgmxeFXJy4rNXMOwDy8UOj2Xt7MMMUtmM",
            authDomain: "campfire-d9343.firebaseapp.com",
            projectId: "campfire-d9343",
            storageBucket: "campfire-d9343.firebasestorage.app",
            messagingSenderId: "334032663189",
            appId: "1:334032663189:web:76f1e09e297a7a652f219c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isSignUpMode = false;
        let currentUser = null;
        
        // Definiujemy grupy/kanały harcerskie
        const harcerzGroups = ["📣 Ogólny", "🐺 Zastęp Wilki", "🦅 Zastęp Orły", "🔥 Kadra / Wędrownicy", "⛺ Sprawy Obozowe"];
        let currentGroup = harcerzGroups[0];
        let unsubscribeMessages = null; // Zmienna do czyszczenia nasłuchiwania starego kanału

        // Renderowanie listy grup w panelu bocznym
        function renderGroupsSidebar() {
            const listContainer = document.getElementById("groups-list");
            listContainer.innerHTML = "";
            harcerzGroups.forEach(group => {
                const btn = document.createElement("button");
                btn.className = `group-btn ${group === currentGroup ? 'active' : ''}`;
                btn.innerText = group;
                btn.onclick = () => switchGroup(group);
                listContainer.appendChild(btn);
            });
        }

        // Zmiana aktualnej grupy czatu
        function switchGroup(groupName) {
            currentGroup = groupName;
            document.getElementById("current-group-title").innerText = `Kanał: ${groupName}`;
            renderGroupsSidebar();
            loadMessages(); // Przeładuj wiadomości dla nowej grupy
        }

        window.toggleAuthMode = function() {
            isSignUpMode = !isSignUpMode;
            document.getElementById("auth-title").innerText = isSignUpMode ? "Stwórz profil ⚜️" : "Campfire 🔥";
            document.getElementById("auth-username").style.display = isSignUpMode ? "block" : "none";
            document.getElementById("auth-btn").innerText = isSignUpMode ? "Zarejestruj się" : "Zaloguj się";
            document.getElementById("auth-toggle-text").innerHTML = isSignUpMode ? 'Masz już konto? <span onclick="toggleAuthMode()">Zaloguj się</span>' : 'Nie masz konta? <span onclick="toggleAuthMode()">Zarejestruj się</span>';
        }

        window.handleAuth = function() {
            const email = document.getElementById("auth-email").value;
            const password = document.getElementById("auth-password").value;
            const username = document.getElementById("auth-username").value.trim();

            if(!email || !password) return alert("Wypełnij e-mail oraz hasło!");
            if(isSignUpMode && !username) return alert("Podaj swoje imię/nick do profilu!");

            if (isSignUpMode) {
                createUserWithEmailAndPassword(auth, email, password)
                    .then((userCredential) => {
                        // Zapisywanie imienia/nicku do profilu Firebase
                        return updateProfile(userCredential.user, { displayName: username });
                    })
                    .catch(error => alert("Błąd rejestracji: " + error.message));
            } else {
                signInWithEmailAndPassword(auth, email, password)
                    .catch(error => alert("Błąd logowania: " + error.message));
            }
        }

        window.logout = function() {
            if (unsubscribeMessages) unsubscribeMessages();
            signOut(auth);
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById("auth-screen").style.display = "none";
                document.getElementById("chat-screen").style.display = "flex";
                
                // Wyświetlanie danych z profilu w dolnym lewym rogu
                document.getElementById("profile-display-name").innerText = user.displayName || "Bez nazwy";
                document.getElementById("profile-display-email").innerText = user.email;
                
                switchGroup(harcerzGroups[0]); // Uruchom domyślną grupę
            } else {
                currentUser = null;
                document.getElementById("auth-screen").style.display = "block";
                document.getElementById("chat-screen").style.display = "none";
            }
        });

        window.sendMessage = async function() {
            const input = document.getElementById("message-input");
            const text = input.value.trim();
            if (!text) return;

            await addDoc(collection(db, "messages"), {
                text: text,
                senderName: currentUser.displayName || "Nieznany Druh",
                senderEmail: currentUser.email,
                group: currentGroup, // Zapisujemy informację, w jakiej grupie wysłano tekst
                createdAt: serverTimestamp()
            });

            input.value = "";
        }

        window.handleKeyPress = function(e) {
            if (e.key === 'Enter') sendMessage();
        }

        // Pobieranie wiadomości przefiltrowanych pod konkretną grupę
        function loadMessages() {
            // Jeśli słuchaliśmy poprzedniej grupy, wyłączamy to, żeby nie mieszać strumieni
            if (unsubscribeMessages) unsubscribeMessages();

            const q = query(
                collection(db, "messages"), 
                where("group", "==", currentGroup), // POBIERAJ TYLKO WIADOMOŚCI Z TEJ GRUPY
                orderBy("createdAt", "asc")
            );

            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                const messagesBox = document.getElementById("messages-box");
                messagesBox.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if(!data.createdAt) return;
                    
                    const isMe = data.senderEmail === currentUser.email;
                    
                    const msgDiv = document.createElement("div");
                    msgDiv.className = `message ${isMe ? 'outgoing' : 'incoming'}`;
                    
                    // Pokazujemy ładne Imię z profilu zamiast maila
                    msgDiv.innerHTML = `<div class="sender">${data.senderName}</div><div>${data.text}</div>`;
                    
                    messagesBox.appendChild(msgDiv);
                });
                messagesBox.scrollTop = messagesBox.scrollHeight;
            });
        }
    </script>
</body>
</html>
