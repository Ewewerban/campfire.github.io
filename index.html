<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campfire</title>
    <link rel="stylesheet" href="./style.css?v=2">
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <h2>Campfire</h2>
        <div class="subtitle">Zwykły, prosty komunikator</div>
        
        <input type="text" id="auth-username" placeholder="Twoja nazwa użytkownika / Nick" style="display: none;">
        <input type="email" id="auth-email" placeholder="Adres e-mail">
        <input type="password" id="auth-password" placeholder="Hasło (min. 6 znaków)">
        <button id="auth-btn" onclick="handleAuth()">Zaloguj się</button>
        <p id="auth-toggle-text">Nie masz konta? <span onclick="toggleAuthMode()">Zarejestruj się</span></p>
    </div>

    <div id="chat-screen" class="chat-interface">
        
        <div class="sidebar">
            <div class="sidebar-header">
                <span>Grupy i kanały</span>
                <button class="create-group-btn" onclick="createNewGroupPrompt()" title="Stwórz nową grupę">+</button>
            </div>
            
            <div class="groups-list" id="groups-list">
                </div>
            
            <div class="user-profile-bar">
                <div class="profile-info">
                    <span class="display-name" id="profile-display-name">Wczytywanie...</span>
                    <span class="display-status" id="profile-display-status">Dostępny</span>
                </div>
                <div class="profile-actions">
                    <button onclick="editProfilePrompt()">Edytuj profil</button>
                    <button class="logout-btn" onclick="logout()">Wyloguj</button>
                </div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header" id="current-group-title"># ogłoszenia</div>
            <div id="messages-box" class="messages-box"></div>
            <div class="chat-input-area">
                <input type="text" id="message-input" placeholder="Napisz wiadomość..." onkeypress="handleKeyPress(event)">
                <button id="send-btn" onclick="sendMessage()">Wyślij</button>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, setDoc, getDoc, updateDoc, arrayUnion, query, orderBy, where, onSnapshot, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const ADMIN_EMAIL = "sowaadamek@gmail.com"; 

        const firebaseConfig = {
            apiKey: "AIzaSyCgmxeFXJy4rNXMOwDy8UOj2Xt7MMMUtmM",
            authDomain: "campfire-d9343.firebaseapp.com",
            projectId: "campfire-d9343",
            storageBucket: "campfire-d9343.firebasestorage.app",
            messagingSenderId: "334032663189",
            appId: "1:334032663189:web:76f1e09e297a7a652f219c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isSignUpMode = false;
        let currentUser = null;
        let userProfileData = { name: "Użytkownik", status: "Dostępny" };
        let activeGroupId = "ogloszenia"; 
        let unsubscribeMessages = null;

        const urlParams = new URLSearchParams(window.location.search);
        const inviteCodeFromUrl = urlParams.get('invite');

        window.createNewGroupPrompt = async function() {
            const groupName = prompt("Wpisz nazwę nowej grupy (np. Projekty, Ekipa):");
            if (!groupName) return;

            const inviteCode = Math.random().toString(36).substring(2, 8);
            const cleanName = groupName.toLowerCase().replace(/\s+/g, '-');

            await addDoc(collection(db, "channels"), {
                name: cleanName,
                inviteCode: inviteCode,
                members: [currentUser.email]
            });

            alert(`Utworzono grupę: #${cleanName}!\nKod zaproszenia: ${inviteCode}`);
        }

        window.copyInviteLink = function(e, inviteCode) {
            e.stopPropagation();
            const cleanUrl = window.location.href.split('?')[0];
            const inviteUrl = `${cleanUrl}?invite=${inviteCode}`;
            
            navigator.clipboard.writeText(inviteUrl).then(() => {
                alert("Skopiowano link zaproszenia do schowka!");
            });
        }

        window.editProfilePrompt = async function() {
            const newName = prompt("Wpisz nową nazwę użytkownika / nick:", userProfileData.name);
            if (!newName) return;
            const newStatus = prompt("Wpisz swój status / opis:", userProfileData.status);
            
            userProfileData.name = newName;
            userProfileData.status = newStatus || "Dostępny";

            await setDoc(doc(db, "users", currentUser.uid), {
                name: userProfileData.name,
                status: userProfileData.status
            }, { merge: true });

            document.getElementById("profile-display-name").innerText = userProfileData.name;
            document.getElementById("profile-display-status").innerText = userProfileData.status;
        }

        async function checkAndApplyInvite(userEmail) {
            if (!inviteCodeFromUrl) return;
            const q = query(collection(db, "channels"), where("inviteCode", "==", inviteCodeFromUrl));
            const querySnapshot = await getDocs(q);

            if (!querySnapshot.empty) {
                querySnapshot.forEach(async (channelDoc) => {
                    const channelData = channelDoc.data();
                    if (!channelData.members.includes(userEmail)) {
                        await updateDoc(doc(db, "channels", channelDoc.id), {
                            members: arrayUnion(userEmail)
                        });
                        alert(`Dołączyłeś do grupy: #${channelData.name}!`);
                    }
                    window.history.replaceState({}, document.title, window.location.href.split('?')[0]);
                });
            }
        }

        function listenToMyChannels() {
            const q = query(collection(db, "channels"), where("members", "array-contains", currentUser.email));
            
            onSnapshot(q, (snapshot) => {
                const listContainer = document.getElementById("groups-list");
                listContainer.innerHTML = "";

                const mainBtn = document.createElement("button");
                mainBtn.className = `group-item ${activeGroupId === "ogloszenia" ? "active" : ""}`;
                mainBtn.innerHTML = `<span class="channel-name"># ogłoszenia</span>`;
                mainBtn.onclick = () => selectChannel("ogloszenia", "# ogłoszenia");
                listContainer.appendChild(mainBtn);

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const btn = document.createElement("button");
                    btn.className = `group-item ${activeGroupId === doc.id ? "active" : ""}`;
                    btn.innerHTML = `
                        <span class="channel-name"># ${data.name}</span>
                        <button class="invite-link-btn" onclick="copyInviteLink(event, '${data.inviteCode}')">Skopiuj link zaproszenia</button>
                    `;
                    btn.onclick = () => selectChannel(doc.id, `# ${data.name}`);
                    listContainer.appendChild(btn);
                });
            });
        }

        function selectChannel(id, displayName) {
            activeGroupId = id;
            document.getElementById("current-group-title").innerText = displayName;
            
            const inputField = document.getElementById("message-input");
            const sendBtn = document.getElementById("send-btn");
            
            if (id === "ogloszenia" && currentUser.email !== ADMIN_EMAIL) {
                inputField.disabled = true;
                inputField.placeholder = "Tylko administrator może tu pisać.";
                sendBtn.style.display = "none";
            } else {
                inputField.disabled = false;
                inputField.placeholder = "Napisz wiadomość...";
                sendBtn.style.display = "block";
            }

            listenToMyChannels();
            loadMessages();
        }

        window.toggleAuthMode = function() {
            isSignUpMode = !isSignUpMode;
            document.getElementById("auth-title").innerText = isSignUpMode ? "Stwórz konto" : "Campfire";
            document.getElementById("auth-username").style.display = isSignUpMode ? "block" : "none";
            document.getElementById("auth-btn").innerText = isSignUpMode ? "Zarejestruj się" : "Zaloguj się";
            document.getElementById("auth-toggle-text").innerHTML = isSignUpMode ? 'Masz już konto? <span onclick="toggleAuthMode()">Zaloguj się</span>' : 'Nie masz konta? <span onclick="toggleAuthMode()">Zarejestruj się</span>';
        }

        window.handleAuth = function() {
            const email = document.getElementById("auth-email").value;
            const password = document.getElementById("auth-password").value;
            const username = document.getElementById("auth-username").value.trim();

            if(!email || !password) return alert("Uzupełnij formularz!");
            if(isSignUpMode && !username) return alert("Wpisz swój nick!");

            if (isSignUpMode) {
                createUserWithEmailAndPassword(auth, email, password)
                    .then(async (userCredential) => {
                        await setDoc(doc(db, "users", userCredential.user.uid), {
                            name: username,
                            status: "Dostępny"
                        });
                        
                        await addDoc(collection(db, "messages"), {
                            text: `Użytkownik @${username} właśnie dołączył do komunikatora. Witamy!`,
                            isSystem: true,
                            channelId: "ogloszenia",
                            createdAt: serverTimestamp()
                        });
                    })
                    .catch(error => alert("Błąd: " + error.message));
            } else {
                signInWithEmailAndPassword(auth, email, password)
                    .catch(error => alert("Błąd: " + error.message));
            }
        }

        window.logout = function() {
            if (unsubscribeMessages) unsubscribeMessages();
            signOut(auth);
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById("auth-screen").style.display = "none";
                document.getElementById("chat-screen").style.display = "flex";
                
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    userProfileData = userDoc.data();
                } else {
                    userProfileData = { name: "Użytkownik", status: "Dostępny" };
                }

                document.getElementById("profile-display-name").innerText = userProfileData.name;
                document.getElementById("profile-display-status").innerText = userProfileData.status;
                
                await checkAndApplyInvite(user.email);
                selectChannel("ogloszenia", "# ogłoszenia");
            } else {
                currentUser = null;
                document.getElementById("auth-screen").style.display = "block";
                document.getElementById("chat-screen").style.display = "none";
            }
        });

        window.sendMessage = async function() {
            const input = document.getElementById("message-input");
            const text = input.value.trim();
            if (!text) return;

            await addDoc(collection(db, "messages"), {
                text: text,
                senderName: userProfileData.name,
                senderStatus: userProfileData.status,
                isSystem: false,
                channelId: activeGroupId,
                createdAt: serverTimestamp()
            });

            input.value = "";
        }

        window.handleKeyPress = function(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function loadMessages() {
            if (unsubscribeMessages) unsubscribeMessages();

            const q = query(
                collection(db, "messages"), 
                where("channelId", "==", activeGroupId),
                orderBy("createdAt", "asc")
            );

            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                const messagesBox = document.getElementById("messages-box");
                messagesBox.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if(!data.createdAt) return;

                    const msgDiv = document.createElement("div");
                    
                    if (data.isSystem) {
                        msgDiv.className = "message system";
                        msgDiv.innerText = data.text;
                    } else {
                        const isMe = data.senderName === userProfileData.name;
                        msgDiv.className = `message ${isMe ? 'outgoing' : 'incoming'}`;
                        msgDiv.innerHTML = `
                            <div class="sender-title">${data.senderName} [${data.senderStatus}]</div>
                            <div>${data.text}</div>
                        `;
                    }
                    messagesBox.appendChild(msgDiv);
                });
                messagesBox.scrollTop = messagesBox.scrollHeight;
            });
        }
    </script>
</body>
</html>
