<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campfire Chat 🔥</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <h2 id="auth-title">Witaj ponownie!</h2>
        <div class="subtitle" id="auth-subtitle">Cieszymy się, że znowu tu jesteś!</div>
        
        <input type="text" id="auth-username" placeholder="Imię / Nick (np. druh Tomek)" style="display: none;">
        <input type="email" id="auth-email" placeholder="Adres e-mail">
        <input type="password" id="auth-password" placeholder="Hasło">
        
        <button id="auth-btn" onclick="handleAuth()">Zaloguj się</button>
        <p id="auth-toggle-text">Potrzebujesz konta? <span onclick="toggleAuthMode()">Zarejestruj się</span></p>
    </div>

    <div id="chat-screen" class="chat-interface">
        
        <div class="sidebar">
            <div class="sidebar-header">
                <span>Kanały tekstowe</span>
                <button class="create-group-btn" onclick="createNewGroupPrompt()" title="Stwórz kanał">+</button>
            </div>
            <div class="groups-list" id="groups-list">
                </div>
            <div class="user-profile-bar">
                <div class="profile-info">
                    <span class="display-name" id="profile-display-name">Wczytywanie...</span>
                    <span class="user-email" id="profile-display-email">...</span>
                </div>
                <button class="logout-btn" onclick="logout()">Wyloguj</button>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header" id="current-group-title"># ogólny</div>
            <div id="messages-box" class="messages-box"></div>
            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="message-input" placeholder="Napisz na tym kanale..." onkeypress="handleKeyPress(event)">
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, updateDoc, arrayUnion, query, orderBy, where, onSnapshot, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgmxeFXJy4rNXMOwDy8UOj2Xt7MMMUtmM",
            authDomain: "campfire-d9343.firebaseapp.com",
            projectId: "campfire-d9343",
            storageBucket: "campfire-d9343.firebasestorage.app",
            messagingSenderId: "334032663189",
            appId: "1:334032663189:web:76f1e09e297a7a652f219c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isSignUpMode = false;
        let currentUser = null;
        let activeGroupId = "ogolny"; 
        let unsubscribeMessages = null;

        // Sprawdzanie czy w adresie URL jest kod zaproszenia (np. ?invite=xyz)
        const urlParams = new URLSearchParams(window.location.search);
        const inviteCodeFromUrl = urlParams.get('invite');

        // FUNKCJA: Stworzenie nowej grupy z unikalnym kodem zaproszenia
        window.createNewGroupPrompt = async function() {
            const groupName = prompt("Wpisz nazwę nowego kanału tekstowego:");
            if (!groupName) return;

            // Generujemy losowy, bezpieczny kod zaproszenia
            const inviteCode = Math.random().toString(36).substring(2, 8);

            // Zapisujemy nową grupę w bazie
            const docRef = await addDoc(collection(db, "channels"), {
                name: groupName.toLowerCase().replace(/\s+/g, '-'),
                inviteCode: inviteCode,
                members: [currentUser.email] // Twórca od razu ma dostęp
            });

            alert(`Utworzono kanał #${groupName}!\n\nKod zaproszenia to: ${inviteCode}\nMożesz też skopiować link bezpośredni po najechaniu na kanał.`);
        }

        // FUNKCJA: Pobieranie i kopiowanie linku zaproszenia dla grupy
        window.copyInviteLink = function(e, inviteCode) {
            e.stopPropagation(); // zatrzymanie kliknięcia, by nie przełączać kanału
            const cleanUrl = window.location.href.split('?')[0];
            const inviteUrl = `${cleanUrl}?invite=${inviteCode}`;
            
            navigator.clipboard.writeText(inviteUrl).then(() => {
                alert("Skopiowano link zaproszenia do schowka! Wyślij go znajomym.");
            }).catch(() => {
                alert(`Nie udało się skopiować automatycznie. Wyślij znajomemu ten kod: ${inviteCode}`);
            });
        }

        // Obsługa wchodzenia przez link z zaproszeniem
        async function checkAndApplyInvite(userEmail) {
            if (!inviteCodeFromUrl) return;

            const q = query(collection(db, "channels"), where("inviteCode", "==", inviteCodeFromUrl));
            const querySnapshot = await getDocs(q);

            if (!querySnapshot.empty) {
                querySnapshot.forEach(async (channelDoc) => {
                    const channelData = channelDoc.data();
                    if (!channelData.members.includes(userEmail)) {
                        // Dodaj użytkownika do listy członków tej ukrytej grupy
                        await updateDoc(doc(db, "channels", channelDoc.id), {
                            members: arrayUnion(userEmail)
                        });
                        alert(`Pomyślnie dołączyłeś do kanału: #${channelData.name}! 🎉`);
                    }
                    // Czyścimy URL z kodu, by przy odświeżeniu nie pokazywać alertu ponownie
                    window.history.replaceState({}, document.title, window.location.href.split('?')[0]);
                });
            } else {
                alert("Ten link zaproszenia jest nieaktywny lub wygasł.");
            }
        }

        // Słuchacz bazy danych: wyświetla tylko kanały, do których użytkownik ma dostęp (SĄ UKRYTE DLA INNYCH!)
        function listenToMyChannels() {
            const q = query(collection(db, "channels"), where("members", "array-contains", currentUser.email));
            
            onSnapshot(q, (snapshot) => {
                const listContainer = document.getElementById("groups-list");
                listContainer.innerHTML = "";

                // Zawsze na górze dodajemy domyślny kanał ogólny (widoczny dla wszystkich)
                const mainBtn = document.createElement("button");
                mainBtn.className = `group-item ${activeGroupId === "ogolny" ? "active" : ""}`;
                mainBtn.innerHTML = `<span># ogólny</span>`;
                mainBtn.onclick = () => selectChannel("ogolny", "# ogólny");
                listContainer.appendChild(mainBtn);

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const btn = document.createElement("button");
                    btn.className = `group-item ${activeGroupId === doc.id ? "active" : ""}`;
                    btn.innerHTML = `<span># ${data.name}</span> <span class="invite-icon" onclick="copyInviteLink(event, '${data.inviteCode}')">Zapś</span>`;
                    btn.onclick = () => selectChannel(doc.id, `# ${data.name}`);
                    listContainer.appendChild(btn);
                });
            });
        }

        function selectChannel(id, displayName) {
            activeGroupId = id;
            document.getElementById("current-group-title").innerText = displayName;
            listenToMyChannels(); // Odśwież podświetlenie aktywnego kanału
            loadMessages(); // Załaduj wiadomości dla wybranego kanału
        }

        // LOGOWANIE / REJESTRACJA
        window.toggleAuthMode = function() {
            isSignUpMode = !isSignUpMode;
            document.getElementById("auth-title").innerText = isSignUpMode ? "Stwórz konto" : "Witaj ponownie!";
            document.getElementById("auth-subtitle").innerText = isSignUpMode ? "Zarejestruj się, aby rozmawiać przy ognisku." : "Cieszymy się, że znowu tu jesteś!";
            document.getElementById("auth-username").style.display = isSignUpMode ? "block" : "none";
            document.getElementById("auth-btn").innerText = isSignUpMode ? "Zarejestruj się" : "Zaloguj się";
            document.getElementById("auth-toggle-text").innerHTML = isSignUpMode ? 'Masz już konto? <span onclick="toggleAuthMode()">Zaloguj się</span>' : 'Potrzebujesz konta? <span onclick="toggleAuthMode()">Zarejestruj się</span>';
        }

        window.handleAuth = function() {
            const email = document.getElementById("auth-email").value;
            const password = document.getElementById("auth-password").value;
            const username = document.getElementById("auth-username").value.trim();

            if(!email || !password) return alert("Uzupełnij pola formularza!");
            if(isSignUpMode && !username) return alert("Wpisz swoją nazwę użytkownika!");

            if (isSignUpMode) {
                createUserWithEmailAndPassword(auth, email, password)
                    .then((userCredential) => {
                        return updateProfile(userCredential.user, { displayName: username });
                    })
                    .catch(error => alert("Błąd: " + error.message));
            } else {
                signInWithEmailAndPassword(auth, email, password)
                    .catch(error => alert("Błąd: " + error.message));
            }
        }

        window.logout = function() {
            if (unsubscribeMessages) unsubscribeMessages();
            signOut(auth);
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById("auth-screen").style.display = "none";
                document.getElementById("chat-screen").style.display = "flex";
                
                document.getElementById("profile-display-name").innerText = user.displayName || "Harcerz";
                document.getElementById("profile-display-email").innerText = user.email;
                
                // 1. Sprawdź czy użytkownik wszedł z linku zaproszenia i przypisz go do tajnej grupy
                await checkAndApplyInvite(user.email);
                // 2. Załaduj listę kanałów tekstowych, do których ma prawo
                listenToMyChannels();
                // 3. Załaduj wiadomości
                loadMessages();
            } else {
                currentUser = null;
                document.getElementById("auth-screen").style.display = "block";
                document.getElementById("chat-screen").style.display = "none";
            }
        });

        // WYSYŁANIE WIADOMOŚCI
        window.sendMessage = async function() {
            const input = document.getElementById("message-input");
            const text = input.value.trim();
            if (!text) return;

            await addDoc(collection(db, "messages"), {
                text: text,
                senderName: currentUser.displayName || "Druhna/Druh",
                senderEmail: currentUser.email,
                channelId: activeGroupId, // Wiadomość trafia do konkretnego ID pokoju
                createdAt: serverTimestamp()
            });

            input.value = "";
        }

        window.handleKeyPress = function(e) {
            if (e.key === 'Enter') sendMessage();
        }

        // STRUMIEŃ WIADOMOŚCI W CZASIE RZECZYWISTYM
        function loadMessages() {
            if (unsubscribeMessages) unsubscribeMessages();

            const q = query(
                collection(db, "messages"), 
                where("channelId", "==", activeGroupId),
                orderBy("createdAt", "asc")
            );

            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                const messagesBox = document.getElementById("messages-box");
                messagesBox.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if(!data.createdAt) return;
                    
                    const date = data.createdAt.toDate();
                    const timeString = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    const msgDiv = document.createElement("div");
                    msgDiv.className = "message";
                    msgDiv.innerHTML = `
                        <div class="msg-header">
                            <span class="sender">${data.senderName}</span>
                            <span class="time">dziś o ${timeString}</span>
                        </div>
                        <div class="text">${data.text}</div>
                    `;
                    messagesBox.appendChild(msgDiv);
                });
                messagesBox.scrollTop = messagesBox.scrollHeight;
            });
        }
    </script>
</body>
</html>
